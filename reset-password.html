<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — ALMS</title>
    <link rel="stylesheet" href="/assets/css/globals.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <script src="/assets/js/auth-guard.js" data-role="guest"></script>
</head>
<body style="background:var(--clr-bg);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:var(--sp-6);">

    <div class="glass-card-strong animate-fade-in-up" style="width:100%;max-width:440px;">
        <div style="text-align:center;margin-bottom:var(--sp-6);">
            <a href="/index.html" style="font-family:var(--font-heading);font-weight:800;font-size:1.25rem;color:var(--clr-text);display:inline-flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:var(--sp-4);">
                <span style="background:var(--clr-primary);color:#FFF;padding:4px 8px;border-radius:6px;">ALMS</span>
            </a>
            <h1 style="font-size:1.5rem;margin-bottom:var(--sp-2);">Reset Your Password</h1>
            <p class="text-secondary" style="font-size:0.875rem;">Choose a strong new password for your account.</p>
        </div>

        <div id="flash-container"></div>
        <div id="invalid-token" style="display:none;text-align:center;">
            <div style="font-size:3rem;margin-bottom:var(--sp-4);">❌</div>
            <p class="text-secondary" style="margin-bottom:var(--sp-6);">This password reset link is invalid or has expired.</p>
            <a href="/forgot-password.html" class="btn btn-primary">Request New Link</a>
        </div>

        <form id="reset-form" style="display:flex;flex-direction:column;gap:var(--sp-4);">
            <input type="hidden" id="token-input">
            <input type="hidden" id="email-input">

            <div class="input-group">
                <label for="new-pw">New Password</label>
                <div class="input-password-wrap">
                    <input type="password" id="new-pw" required class="input-field" placeholder="Min 8 chars, 1 uppercase, 1 number">
                    <button type="button" class="toggle-pw" aria-label="Toggle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
                <div class="strength-meter" id="pw-strength">
                    <div class="strength-meter-bar"></div>
                    <div class="strength-meter-bar"></div>
                    <div class="strength-meter-bar"></div>
                    <div class="strength-meter-bar"></div>
                </div>
            </div>

            <div class="input-group">
                <label for="confirm-pw">Confirm New Password</label>
                <div class="input-password-wrap">
                    <input type="password" id="confirm-pw" required class="input-field">
                    <button type="button" class="toggle-pw" aria-label="Toggle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="reset-btn" class="btn btn-primary btn-full">Set New Password</button>
        </form>
    </div>

    <script src="/assets/js/main.js"></script>
    <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const email = params.get('email');
    let csrfToken = '';

    if (!token || !email) {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('invalid-token').style.display = 'block';
    } else {
        document.getElementById('token-input').value = token;
        document.getElementById('email-input').value = email;
    }

    fetch('/api/session.php', {credentials:'include'}).then(r=>r.json()).then(d=>{ csrfToken = d.csrf_token||''; }).catch(()=>{});

    document.getElementById('new-pw').addEventListener('input', function() {
        const val = this.value;
        let strength = '';
        if (val.length >= 8) {
            let m = 0;
            if(/[a-z]/.test(val)) m++; if(/[A-Z]/.test(val)) m++;
            if(/[0-9]/.test(val)) m++; if(/[^A-Za-z0-9]/.test(val)) m++;
            if(m===1) strength='weak'; else if(m===2) strength='fair';
            else if(m===3) strength='good'; else strength='strong';
        } else if (val.length > 0) { strength = 'weak'; }
        document.getElementById('pw-strength').setAttribute('data-strength', strength);
    });

    document.getElementById('reset-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const flash = document.getElementById('flash-container');
        const pw = document.getElementById('new-pw').value;
        const pc = document.getElementById('confirm-pw').value;
        const btn = document.getElementById('reset-btn');

        if (pw.length < 8 || !/[A-Z]/.test(pw) || !/[0-9]/.test(pw)) {
            flash.innerHTML = `<div class="flash-msg error"><span>Password must be at least 8 characters with an uppercase letter and a number.</span></div>`;
            return;
        }
        if (pw !== pc) {
            flash.innerHTML = `<div class="flash-msg error"><span>Passwords do not match.</span></div>`;
            return;
        }

        btn.disabled = true; btn.textContent = 'Saving...';
        try {
            const res = await fetch('/api/password-reset.php', {
                method: 'POST', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action:'reset', token, email, password: pw, confirm_password: pc, csrf_token: csrfToken })
            });
            const data = await res.json();
            if (data.success) { window.location.href = '/index.html?msg=password_reset'; }
            else {
                const msgs = { invalid_reset_token:'Reset link is invalid or already used.', reset_token_expired:'Reset link has expired. Please request a new one.' };
                flash.innerHTML = `<div class="flash-msg error"><span>${msgs[data.error] || 'Password reset failed.'}</span></div>`;
                btn.disabled = false; btn.textContent = 'Set New Password';
            }
        } catch(err) {
            flash.innerHTML = `<div class="flash-msg error"><span>Network error. Please try again.</span></div>`;
            btn.disabled = false; btn.textContent = 'Set New Password';
        }
    });

    document.querySelectorAll('.toggle-pw').forEach(btn => {
        btn.addEventListener('click', e => {
            e.preventDefault();
            const input = btn.previousElementSibling;
            if (input && input.classList.contains('input-field')) input.type = input.type==='password' ? 'text' : 'password';
        });
    });
    </script>
</body>
</html>
