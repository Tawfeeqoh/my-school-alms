<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ALMS</title>
    <meta name="description" content="Request an ALMS password reset link.">
    <link rel="stylesheet" href="./globals.css">
    <link rel="stylesheet" href="./components.css">
    <link rel="stylesheet" href="./layout.css">
</head>
<body class="alms-static" data-page="forgot-password">
    <header class="public-header">
        <div class="container static-nav">
            <a href="./login.html" class="static-brand">
                <span>ALMS</span>
                FCAH&PT Ibadan
            </a>
            <div class="static-nav-actions">
                <a href="./login.html" class="btn btn-outline btn-sm">Return to Sign In</a>
            </div>
        </div>
    </header>

    <main class="static-auth-page">
        <section class="auth-panel" aria-labelledby="forgot-title">
            <h1 id="forgot-title">Forgot Password</h1>
            <p class="text-secondary">Enter your institutional email and we’ll send a secure password recovery link.</p>
            <div id="forgot-alert" class="static-alert" hidden></div>
            <form id="forgot-password-form" class="static-form">
                <div class="input-group">
                    <label for="forgot-email">Email</label>
                    <input class="input-field" id="forgot-email" name="email" type="email" autocomplete="email" required>
                </div>
                <button class="btn btn-primary btn-full" type="submit">Send Reset Link</button>
            </form>
            <div class="static-auth-links">
                <a href="./login.html">Back to login</a>
                <a href="./register.html">Create an account</a>
            </div>
        </section>
    </main>

    <script src="./static-frontend.js"></script>
</body>
</html>
