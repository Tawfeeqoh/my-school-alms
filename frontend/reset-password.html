<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ALMS</title>
    <meta name="description" content="Reset your ALMS password using the secure link sent to your email.">
    <link rel="stylesheet" href="./globals.css">
    <link rel="stylesheet" href="./components.css">
    <link rel="stylesheet" href="./layout.css">
</head>
<body class="alms-static" data-page="reset-password">
    <header class="public-header">
        <div class="container static-nav">
            <a href="./login.html" class="static-brand">
                <span>ALMS</span>
                FCAH&PT Ibadan
            </a>
            <div class="static-nav-actions">
                <a href="./login.html" class="btn btn-outline btn-sm">Sign In</a>
            </div>
        </div>
    </header>

    <main class="static-auth-page">
        <section class="auth-panel" aria-labelledby="reset-title">
            <h1 id="reset-title">Reset Password</h1>
            <p class="text-secondary">Enter a new secure password. The reset code and email should already be present in the link.</p>
            <div id="reset-alert" class="static-alert" hidden></div>
            <form id="reset-password-form" class="static-form">
                <input type="hidden" id="reset-token" name="token">
                <input type="hidden" id="reset-email" name="email">
                <div class="input-group">
                    <label for="reset-password">New Password</label>
                    <input class="input-field" id="reset-password" name="password" type="password" minlength="8" required>
                </div>
                <div class="input-group">
                    <label for="reset-confirm-password">Confirm Password</label>
                    <input class="input-field" id="reset-confirm-password" name="confirm_password" type="password" minlength="8" required>
                </div>
                <button class="btn btn-primary btn-full" type="submit">Update Password</button>
            </form>
            <div class="static-auth-links">
                <a href="./login.html">Back to login</a>
                <a href="./forgot-password.html">Resend link</a>
            </div>
        </section>
    </main>

    <script src="./static-frontend.js"></script>
</body>
</html>
