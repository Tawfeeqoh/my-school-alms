<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMS System Administration — Login</title>
    <link rel="stylesheet" href="/assets/css/globals.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <script src="/assets/js/auth-guard.js" data-role="guest"></script>
    <style>
        body.admin-body {
            background-color: #0c0c0e;
            color: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .admin-glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-2xl);
            padding: var(--sp-8);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
        }
        .admin-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f2f2f7 !important;
        }
        .admin-input:focus {
            background: rgba(255, 255, 255, 0.08) !important;
            border-color: var(--clr-primary) !important;
            box-shadow: 0 0 0 4px rgba(209, 0, 0, 0.3) !important;
        }
    </style>
</head>
<body class="admin-body film-grain">

    <div class="admin-glass-card animate-fade-in-up">
        
        <div style="text-align: center; margin-bottom: var(--sp-8);">
            <div style="display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; background: var(--clr-primary); border-radius: 12px; color: #FFFFFF; font-weight: 800; font-size: 1.5rem; margin-bottom: var(--sp-4);">
                AD
            </div>
            <h1 class="hero-text-cinematic" style="font-size: 1.5rem; color: #FFFFFF; letter-spacing: -0.01em;">System Administration</h1>
            <p style="font-family: var(--font-mono); font-size: 0.75rem; color: #8E8E93; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 8px;">Authorized Personnel Only</p>
        </div>

        <div id="flash-container"></div>

        <!-- Admin Login Form -->
        <form id="admin-login-form" style="display: flex; flex-direction: column; gap: var(--sp-5);">
            <div class="input-group">
                <label for="admin-email" style="color: #E5E5EA;">Admin Email</label>
                <input type="email" id="admin-email" name="email" required placeholder="admin@fcahptib.edu.ng" class="input-field admin-input" autocomplete="email">
            </div>

            <div class="input-group">
                <label for="admin-password" style="color: #E5E5EA;">Password</label>
                <div class="input-password-wrap">
                    <input type="password" id="admin-password" name="password" required class="input-field admin-input" autocomplete="current-password">
                    <button type="button" class="toggle-pw" aria-label="Toggle Password Visibility" style="color: rgba(255,255,255,0.4);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="admin-login-submit" class="btn btn-primary btn-full animate-pulse-glow" style="margin-top: 10px;">Authenticate System</button>
        </form>

        <div style="text-align: center; margin-top: var(--sp-6);">
            <a href="/index.html" style="font-size: 0.8125rem; color: #8E8E93; text-decoration: underline;">Return to Public Portal</a>
        </div>

    </div>

    <!-- Scripts -->
    <script src="/assets/js/main.js"></script>
    <script>
    // Fetch CSRF then wire login form
    let csrfToken = '';
    fetch('/api/session.php', { credentials: 'include' })
        .then(r => r.json())
        .then(d => { csrfToken = d.csrf_token || ''; })
        .catch(() => {});

    document.getElementById('admin-login-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('admin-login-submit');
        btn.disabled = true;
        btn.innerHTML = `Authenticating...`;

        const flash = document.getElementById('flash-container');
        flash.innerHTML = '';

        try {
            const res = await fetch('/api/auth.php', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action:      'login',
                    email:       document.getElementById('admin-email').value.trim(),
                    password:    document.getElementById('admin-password').value,
                    csrf_token:  csrfToken
                })
            });
            const data = await res.json();
            if (data.success) {
                const role = data.role || data.user?.role;
                if (role === 'admin') {
                    window.location.href = '/admin/dashboard.html';
                } else {
                    window.location.href = '/index.html?error=forbidden';
                }
            } else {
                flash.innerHTML = `<div class="flash-msg error"><span>${escHtml(data.message || 'Authentication failed.')}</span></div>`;
                btn.disabled = false;
                btn.innerHTML = `Authenticate System`;
            }
        } catch(err) {
            flash.innerHTML = `<div class="flash-msg error"><span>Network error. Please try again.</span></div>`;
            btn.disabled = false;
            btn.innerHTML = `Authenticate System`;
        }
        document.dispatchEvent(new Event('DOMContentLoaded')); // Trigger flash auto-dismiss
    });

    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    </script>
</body>
</html>
