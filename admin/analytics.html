<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — ALMS Admin</title>
    <link rel="stylesheet" href="/assets/css/globals.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/layout.css">
    <script src="/assets/js/auth-guard.js" data-role="admin"></script>
</head>
<body class="film-grain" data-page="analytics">
<div class="dashboard-shell">
    <div id="sidebar-container"></div>
    <div class="main-content" id="main-content">
        <div id="topbar-container"></div>
        <div class="page-content animate-fade-in">
            <div class="page-header">
                <h1 class="page-title">Platform Analytics</h1>
                <p class="page-subtitle">System-wide usage metrics and wellness trends</p>
            </div>

            <!-- Stats -->
            <div class="stats-row" style="margin-bottom:var(--sp-6);">
                <div class="stat-card"><div class="stat-card-icon blue"><span style="font-size:1.25rem;">🎓</span></div><div><div class="stat-card-value font-mono-data" id="an-students">—</div><div class="stat-card-label">Total Students</div></div></div>
                <div class="stat-card"><div class="stat-card-icon red"><span style="font-size:1.25rem;">📚</span></div><div><div class="stat-card-value font-mono-data" id="an-lessons">—</div><div class="stat-card-label">Lessons Completed</div></div></div>
                <div class="stat-card"><div class="stat-card-icon green"><span style="font-size:1.25rem;">🧠</span></div><div><div class="stat-card-value font-mono-data" id="an-quizzes">—</div><div class="stat-card-label">Quiz Attempts</div></div></div>
                <div class="stat-card"><div class="stat-card-icon amber"><span style="font-size:1.25rem;">📋</span></div><div><div class="stat-card-value font-mono-data" id="an-submissions">—</div><div class="stat-card-label">Submissions</div></div></div>
            </div>

            <div class="content-grid">
                <!-- VARK Distribution -->
                <div class="dashboard-widget reveal-element">
                    <h3 style="font-size:1rem;font-weight:700;margin-bottom:var(--sp-5);">VARK Style Distribution</h3>
                    <div id="vark-dist" style="display:flex;flex-direction:column;gap:var(--sp-3);"></div>
                </div>

                <!-- Pace Distribution -->
                <div class="dashboard-widget reveal-element">
                    <h3 style="font-size:1rem;font-weight:700;margin-bottom:var(--sp-5);">Learning Pace Distribution</h3>
                    <div id="pace-dist" style="display:flex;flex-direction:column;gap:var(--sp-3);"></div>

                    <h3 style="font-size:1rem;font-weight:700;margin:var(--sp-6) 0 var(--sp-4);">Platform-Wide Wellness</h3>
                    <div id="wellness-dist" style="display:flex;flex-direction:column;gap:var(--sp-3);"></div>
                </div>
            </div>

            <!-- Top Courses -->
            <div class="dashboard-widget reveal-element" style="margin-top:var(--sp-6);">
                <h3 style="font-size:1rem;font-weight:700;margin-bottom:var(--sp-4);">Most Engaged Courses</h3>
                <div id="top-courses-list"></div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="/assets/js/layout.js"></script>
<script src="/assets/js/main.js"></script>
<script>
document.addEventListener('alms:session-ready', async function() {
    try {
        const res = await fetch('/api/admin-analytics.php', { credentials: 'include' });
        const data = await res.json();
        if (!data.success) return;

        document.getElementById('an-students').textContent = data.totals?.students ?? '—';
        document.getElementById('an-lessons').textContent = data.totals?.lessons_completed ?? '—';
        document.getElementById('an-quizzes').textContent = data.totals?.quiz_attempts ?? '—';
        document.getElementById('an-submissions').textContent = data.totals?.submissions ?? '—';

        function renderBar(containerId, items, total, colors) {
            const cont = document.getElementById(containerId);
            if (!items || !items.length) { cont.innerHTML = '<p class="text-muted text-sm">No data yet.</p>'; return; }
            cont.innerHTML = items.map((item, i) => {
                const pct = total > 0 ? Math.round((item.count / total) * 100) : 0;
                return `<div>
                    <div style="display:flex;justify-content:space-between;font-size:0.8125rem;margin-bottom:4px;">
                        <span>${item.label}</span><span class="font-mono-data">${item.count} (${pct}%)</span>
                    </div>
                    <div class="progress-bar"><div class="progress-bar-fill" style="width:0%;background:${colors[i%colors.length]};" data-target="${pct}"></div></div>
                </div>`;
            }).join('');
            document.querySelectorAll(`#${containerId} .progress-bar-fill`).forEach(b => gsap.to(b, { width: b.dataset.target+'%', duration: 0.9, ease: 'power2.out' }));
        }

        const VARK_COLORS = ['#7C3AED','#DB2777','#2563EB','#059669'];
        const PACE_COLORS = ['#F59E0B','#3B82F6','var(--clr-primary)'];
        const WELLNESS_COLORS = ['#059669','#F59E0B','var(--clr-danger)'];

        const totalVark = (data.vark_distribution||[]).reduce((s,i)=>s+i.count,0);
        const totalPace = (data.pace_distribution||[]).reduce((s,i)=>s+i.count,0);
        const totalWell = (data.wellness_distribution||[]).reduce((s,i)=>s+i.count,0);

        renderBar('vark-dist', data.vark_distribution, totalVark, VARK_COLORS);
        renderBar('pace-dist', data.pace_distribution, totalPace, PACE_COLORS);
        renderBar('wellness-dist', data.wellness_distribution, totalWell, WELLNESS_COLORS);

        // Top courses
        const courses = data.top_courses || [];
        document.getElementById('top-courses-list').innerHTML = courses.length
            ? `<table class="data-table"><thead><tr><th>Course</th><th>Department</th><th>Lesson Completions</th><th>Quiz Attempts</th></tr></thead><tbody>
                ${courses.map(c => `<tr>
                    <td><span class="font-mono-data">${escHtml(c.course_code)}</span> ${escHtml(c.course_name)}</td>
                    <td style="font-size:0.8125rem;">${escHtml(c.department_name||'')}</td>
                    <td class="font-mono-data">${c.lesson_completions||0}</td>
                    <td class="font-mono-data">${c.quiz_attempts||0}</td>
                </tr>`).join('')}</tbody></table>`
            : '<p class="text-muted text-sm">No engagement data yet.</p>';

    } catch(e) {}
});
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
