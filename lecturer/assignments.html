<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments — ALMS Lecturer</title>
    <link rel="stylesheet" href="/assets/css/globals.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/layout.css">
    <script src="/assets/js/auth-guard.js" data-role="lecturer"></script>
</head>
<body class="film-grain" data-page="assignments">
<div class="dashboard-shell">
    <div id="sidebar-container"></div>
    <div class="main-content" id="main-content">
        <div id="topbar-container"></div>
        <div class="page-content animate-fade-in">
            <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--sp-4);">
                <div>
                    <h1 class="page-title">Assignments</h1>
                    <p class="page-subtitle">Manage and grade student submissions</p>
                </div>
                <button class="btn btn-primary" onclick="openCreateModal()">+ Create Assignment</button>
            </div>

            <div id="flash-container"></div>

            <!-- Assignment list with submissions -->
            <div id="assignments-container" style="display:flex;flex-direction:column;gap:var(--sp-5);">
                <div class="animate-shimmer" style="height:120px;border-radius:var(--radius-2xl);"></div>
                <div class="animate-shimmer" style="height:120px;border-radius:var(--radius-2xl);"></div>
            </div>
        </div>
    </div>
</div>

<!-- Create Assignment Modal -->
<div class="modal-overlay" id="create-modal">
    <div class="modal-card" style="max-width:560px;">
        <div class="modal-header">
            <h3>Create Assignment</h3>
            <button class="modal-close" onclick="closeModal('create-modal')">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div id="create-flash"></div>
        <div style="display:flex;flex-direction:column;gap:var(--sp-4);">
            <div class="input-group">
                <label for="asgn-course">Course</label>
                <select id="asgn-course" class="input-field"></select>
            </div>
            <div class="input-group">
                <label for="asgn-title">Assignment Title</label>
                <input type="text" id="asgn-title" class="input-field" placeholder="e.g. Practical Report — Week 4">
            </div>
            <div class="input-group">
                <label for="asgn-desc">Description</label>
                <textarea id="asgn-desc" class="input-field" rows="4" placeholder="Describe the assignment task and requirements..."></textarea>
            </div>
            <div class="input-group">
                <label for="asgn-due">Due Date</label>
                <input type="datetime-local" id="asgn-due" class="input-field">
            </div>
            <div class="input-group">
                <label for="asgn-points">Max Points</label>
                <input type="number" id="asgn-points" class="input-field" value="100" min="1" max="1000">
            </div>
        </div>
        <button class="btn btn-primary btn-full" style="margin-top:var(--sp-4);" onclick="createAssignment()">Create Assignment</button>
    </div>
</div>

<!-- Grade Modal -->
<div class="modal-overlay" id="grade-modal">
    <div class="modal-card" style="max-width:500px;">
        <div class="modal-header">
            <h3>Grade Submission</h3>
            <button class="modal-close" onclick="closeModal('grade-modal')">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div id="grade-flash"></div>
        <input type="hidden" id="grade-submission-id">
        <div style="display:flex;flex-direction:column;gap:var(--sp-4);">
            <div><p class="text-muted text-sm" id="grade-student-name"></p></div>
            <div style="display:flex;gap:var(--sp-3);">
                <a id="grade-download-link" class="btn btn-outline btn-sm" target="_blank">📥 View Submission</a>
            </div>
            <div class="input-group">
                <label for="grade-score">Grade / Points</label>
                <input type="text" id="grade-score" class="input-field" placeholder="e.g. 85 or A">
            </div>
            <div class="input-group">
                <label for="grade-feedback">Feedback to Student</label>
                <textarea id="grade-feedback" class="input-field" rows="3" placeholder="Your constructive feedback..."></textarea>
            </div>
        </div>
        <button class="btn btn-primary btn-full" style="margin-top:var(--sp-4);" onclick="submitGrade()">Save Grade</button>
    </div>
</div>

<script src="/assets/js/layout.js"></script>
<script src="/assets/js/main.js"></script>
<script>
let allCourses = [];
const urlParams = new URLSearchParams(window.location.search);
const filterCourseId = urlParams.get('course_id');

document.addEventListener('alms:session-ready', async function() {
    try {
        const [assignRes, courseRes] = await Promise.all([
            fetch('/api/lecturer-assignments.php', { credentials: 'include' }),
            fetch('/api/lecturer-courses.php', { credentials: 'include' })
        ]);
        const assignData = await assignRes.json();
        const courseData = await courseRes.json();
        allCourses = courseData.courses || [];

        // Populate course selects
        const sel = document.getElementById('asgn-course');
        allCourses.forEach(c => {
            sel.appendChild(new Option(`${c.course_code} — ${c.course_name}`, c.id));
        });

        const assignments = (assignData.assignments || []).filter(a => !filterCourseId || a.course_id == filterCourseId);
        renderAssignments(assignments);
    } catch(e) { document.getElementById('assignments-container').innerHTML = '<p class="text-muted">Could not load assignments.</p>'; }
});

function renderAssignments(assignments) {
    if (!assignments.length) {
        document.getElementById('assignments-container').innerHTML = `<div class="empty-state"><div style="font-size:2.5rem;">📋</div><h3 class="empty-state-title">No Assignments Yet</h3><p class="empty-state-desc">Create your first assignment for students to submit.</p></div>`;
        return;
    }
    document.getElementById('assignments-container').innerHTML = assignments.map(a => {
        const due = new Date(a.due_date);
        const dueStr = new Intl.DateTimeFormat('en-NG', { dateStyle: 'medium', timeStyle: 'short' }).format(due);
        const overdue = due < new Date();
        return `
        <div class="dashboard-widget reveal-element">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:var(--sp-4);margin-bottom:var(--sp-4);">
                <div>
                    <div style="display:flex;gap:var(--sp-2);margin-bottom:6px;flex-wrap:wrap;">
                        <span class="badge badge-neutral font-mono-data">${escHtml(a.course_code||'')}</span>
                        <span class="badge ${overdue?'badge-red':'badge-amber'}">Due ${dueStr}</span>
                    </div>
                    <h4 style="font-size:1rem;font-weight:700;">${escHtml(a.title)}</h4>
                    <p class="text-muted text-sm">${escHtml((a.description||'').substring(0,100))}...</p>
                </div>
                <div style="display:flex;gap:var(--sp-2);">
                    <span class="badge badge-blue">${a.submission_count||0} Submitted</span>
                </div>
            </div>
            <div style="overflow-x:auto;">
                <table class="data-table">
                    <thead><tr><th>Student</th><th>Matric</th><th>Submitted</th><th>Grade</th><th></th></tr></thead>
                    <tbody>
                        ${(a.submissions||[]).length ? a.submissions.map(s => `
                        <tr>
                            <td>${escHtml(s.first_name)} ${escHtml(s.last_name)}</td>
                            <td class="font-mono-data">${escHtml(s.matric_number||'')}</td>
                            <td style="font-size:0.75rem;color:var(--clr-text-muted);">${new Intl.DateTimeFormat('en-NG',{dateStyle:'short'}).format(new Date(s.submitted_at))}</td>
                            <td>${s.grade ? `<span class="badge badge-green">${escHtml(s.grade)}</span>` : '<span class="badge badge-amber">Pending</span>'}</td>
                            <td><button class="btn btn-ghost btn-sm" onclick="openGradeModal(${s.id}, '${escHtml(s.first_name)} ${escHtml(s.last_name)}', '${escHtml(s.file_path||'')}', '${escHtml(s.grade||'')}', '${escHtml(s.feedback||'')}')">Grade</button></td>
                        </tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--clr-text-muted);padding:24px;">No submissions yet.</td></tr>'}
                    </tbody>
                </table>
            </div>
        </div>`;
    }).join('');
}

function openCreateModal() { document.getElementById('create-modal').classList.add('active'); }

function openGradeModal(id, name, filePath, grade, feedback) {
    document.getElementById('grade-submission-id').value = id;
    document.getElementById('grade-student-name').textContent = `Student: ${name}`;
    document.getElementById('grade-score').value = grade;
    document.getElementById('grade-feedback').value = feedback;
    const dl = document.getElementById('grade-download-link');
    dl.href = filePath ? `/uploads/submissions/${filePath}` : '#';
    dl.style.opacity = filePath ? '1' : '0.4';
    dl.style.pointerEvents = filePath ? 'auto' : 'none';
    document.getElementById('grade-flash').innerHTML = '';
    document.getElementById('grade-modal').classList.add('active');
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

async function createAssignment() {
    const title = document.getElementById('asgn-title').value.trim();
    const courseId = document.getElementById('asgn-course').value;
    const desc = document.getElementById('asgn-desc').value.trim();
    const due = document.getElementById('asgn-due').value;
    const pts = document.getElementById('asgn-points').value;
    const flash = document.getElementById('create-flash');

    if (!title || !courseId || !due) { flash.innerHTML = '<div class="flash-msg error"><span>Please fill in all required fields.</span></div>'; return; }
    try {
        const res = await fetch('/api/lecturer-assignments.php', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'create', course_id: courseId, title, description: desc, due_date: due, max_points: pts, csrf_token: window.ALMS?.csrfToken || '' })
        });
        const data = await res.json();
        if (data.success) { closeModal('create-modal'); location.reload(); }
        else flash.innerHTML = `<div class="flash-msg error"><span>${data.message || 'Failed to create.'}</span></div>`;
    } catch(e) { flash.innerHTML = '<div class="flash-msg error"><span>Network error.</span></div>'; }
}

async function submitGrade() {
    const id = document.getElementById('grade-submission-id').value;
    const grade = document.getElementById('grade-score').value.trim();
    const feedback = document.getElementById('grade-feedback').value.trim();
    const flash = document.getElementById('grade-flash');
    if (!grade) { flash.innerHTML = '<div class="flash-msg error"><span>Please enter a grade.</span></div>'; return; }
    try {
        const res = await fetch('/api/lecturer-assignments.php', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'grade', submission_id: id, grade, feedback, csrf_token: window.ALMS?.csrfToken || '' })
        });
        const data = await res.json();
        if (data.success) { closeModal('grade-modal'); location.reload(); }
        else flash.innerHTML = `<div class="flash-msg error"><span>${data.message || 'Failed to save grade.'}</span></div>`;
    } catch(e) { flash.innerHTML = '<div class="flash-msg error"><span>Network error.</span></div>'; }
}

document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); }));
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
