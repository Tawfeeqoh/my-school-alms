<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses — ALMS Lecturer</title>
    <link rel="stylesheet" href="/assets/css/globals.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/layout.css">
    <script src="/assets/js/auth-guard.js" data-role="lecturer"></script>
</head>
<body class="film-grain" data-page="courses">
<div class="dashboard-shell">
    <div id="sidebar-container"></div>
    <div class="main-content" id="main-content">
        <div id="topbar-container"></div>
        <div class="page-content animate-fade-in">
            <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:var(--sp-4);">
                <div>
                    <h1 class="page-title">My Course Portfolio</h1>
                    <p class="page-subtitle">Courses assigned to you for curriculum management</p>
                </div>
            </div>
            <div id="courses-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--sp-5);">
                <div class="animate-shimmer" style="height:200px;border-radius:var(--radius-2xl);"></div>
                <div class="animate-shimmer" style="height:200px;border-radius:var(--radius-2xl);"></div>
            </div>
        </div>
    </div>
</div>
<script src="/assets/js/layout.js"></script>
<script src="/assets/js/main.js"></script>
<script>
document.addEventListener('alms:session-ready', async function() {
    try {
        const res = await fetch('/api/lecturer-courses.php', { credentials: 'include' });
        const data = await res.json();
        const courses = data.courses || [];
        if (!courses.length) {
            document.getElementById('courses-grid').innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div style="font-size:2.5rem;">📭</div><h3 class="empty-state-title">No Courses Assigned</h3><p class="empty-state-desc">An administrator needs to assign courses to your profile.</p></div>`;
            return;
        }
        document.getElementById('courses-grid').innerHTML = courses.map(c => `
            <div class="course-card reveal-element depth-lift">
                <div class="course-card-header">
                    <div class="course-card-icon">📚</div>
                    <div style="display:flex;gap:var(--sp-2);">
                        <span class="badge badge-neutral">${escHtml(c.level||'')}</span>
                        <span class="badge badge-neutral">${escHtml(c.course_code)}</span>
                    </div>
                </div>
                <div>
                    <div class="course-card-title">${escHtml(c.course_name)}</div>
                    <div class="course-card-code text-muted">${escHtml(c.department_name||'')}</div>
                </div>
                <div style="display:flex;flex-direction:column;gap:var(--sp-2);">
                    <div style="display:flex;justify-content:space-between;font-size:0.8125rem;color:var(--clr-text-secondary);">
                        <span>📖 ${c.lesson_count||0} Lessons</span>
                        <span>📋 ${c.assignment_count||0} Assignments</span>
                        <span>🧠 ${c.quiz_count||0} Quizzes</span>
                    </div>
                </div>
                <div style="display:flex;gap:var(--sp-2);flex-wrap:wrap;">
                    <a href="/lecturer/course-builder.html?course_id=${c.id}" class="btn btn-primary btn-sm" style="flex:1;">Edit Materials</a>
                    <a href="/lecturer/assignments.html?course_id=${c.id}" class="btn btn-outline btn-sm">Assignments</a>
                </div>
            </div>`).join('');
    } catch(e) { document.getElementById('courses-grid').innerHTML = '<p class="text-muted">Could not load courses.</p>'; }
});
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
