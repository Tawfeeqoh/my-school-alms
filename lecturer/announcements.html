<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Announcements — ALMS</title>
    <link rel="stylesheet" href="/assets/css/globals.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/layout.css">
    <script src="/assets/js/auth-guard.js" data-role="lecturer"></script>
</head>
<body class="film-grain" data-page="announcements">

<div class="dashboard-shell">
    <div id="sidebar-container"></div>
    <div class="main-content" id="main-content">
        <div id="topbar-container"></div>
        <div class="page-content animate-fade-in" style="max-width:760px;">
            <div class="page-header">
                <h1 class="page-title">Course Announcements</h1>
                <p class="page-subtitle">Send targeted updates to students in your assigned course cohorts.</p>
            </div>
            
            <div id="flash-container"></div>

            <div class="dashboard-widget">
                <form id="announcement-form" style="display:flex; flex-direction:column; gap:16px;">
                    <div class="input-group">
                        <label for="course-id">Course Cohort</label>
                        <select class="input-field" id="course-id" name="course_id" required>
                            <option value="">Select course</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="title">Title</label>
                        <input class="input-field" id="title" name="title" required placeholder="e.g. Test postponement">
                    </div>
                    <div class="input-group">
                        <label for="message">Message</label>
                        <textarea class="input-field" id="message" name="message" rows="5" required placeholder="Type your announcement details here..."></textarea>
                    </div>
                    <button class="btn btn-primary" type="submit" id="submit-btn">Send Announcement</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="/assets/js/layout.js"></script>
<script src="/assets/js/main.js"></script>
<script>
document.addEventListener('alms:session-ready', async function() {
    let data;
    try {
        const res = await fetch('/api/lecturer-announcements.php', { credentials: 'include' });
        data = await res.json();
    } catch(err) { return; }
    if (!data.success) return;

    const select = document.getElementById('course-id');
    const courses = data.courses || [];
    select.innerHTML = '<option value="">Select course</option>' + courses.map(course => `
        <option value="${course.id}">${escHtml(course.course_code)} - ${escHtml(course.course_name)}</option>
    `).join('');
});

document.getElementById('announcement-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const flash = document.getElementById('flash-container');
    const courseId = document.getElementById('course-id').value;
    const title = document.getElementById('title').value;
    const message = document.getElementById('message').value;

    btn.disabled = true;
    btn.textContent = 'Sending...';
    flash.innerHTML = '';

    try {
        const res = await fetch('/api/lecturer-announcements.php', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-Token': window.ALMS?.csrfToken || ''
            },
            credentials: 'include',
            body: JSON.stringify({ course_id: courseId, title, message })
        });
        const data = await res.json();
        if (data.success) {
            flash.innerHTML = `<div class="flash-msg success"><span>${escHtml(data.message)}</span></div>`;
            document.getElementById('title').value = '';
            document.getElementById('message').value = '';
            document.getElementById('course-id').value = '';
        } else {
            flash.innerHTML = `<div class="flash-msg error"><span>${escHtml(data.message)}</span></div>`;
        }
    } catch(err) {
        flash.innerHTML = '<div class="flash-msg error"><span>Network error. Please try again.</span></div>';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Send Announcement';
        initFlashMessages();
    }
});

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
