<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — ALMS</title>
    <meta name="description" content="Reset your ALMS account password.">
    <link rel="stylesheet" href="/assets/css/globals.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <script src="/assets/js/auth-guard.js" data-role="guest"></script>
</head>
<body style="background:var(--clr-bg);display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;padding:var(--sp-6);">

    <div class="glass-card-strong animate-fade-in-up" style="width:100%;max-width:440px;">

        <div style="text-align:center;margin-bottom:var(--sp-6);">
            <a href="/index.html" style="font-family:var(--font-heading);font-weight:800;font-size:1.25rem;color:var(--clr-text);display:inline-flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:var(--sp-4);">
                <span style="background:var(--clr-primary);color:#FFF;padding:4px 8px;border-radius:6px;">ALMS</span>
            </a>
            <h1 style="font-size:1.5rem;margin-bottom:var(--sp-2);">Forgot Password?</h1>
            <p class="text-secondary" style="font-size:0.875rem;">Enter your account email and we'll send a reset link.</p>
        </div>

        <div id="flash-container"></div>

        <!-- Step 1: Request Reset -->
        <div id="step-request">
            <form id="request-form" style="display:flex;flex-direction:column;gap:var(--sp-4);">
                <div class="input-group">
                    <label for="reset-email">Email Address</label>
                    <input type="email" id="reset-email" required placeholder="your.name@fcahptib.edu.ng" class="input-field">
                </div>
                <button type="submit" id="request-btn" class="btn btn-primary btn-full">
                    Send Reset Link
                </button>
            </form>
            <div style="margin-top:var(--sp-4);text-align:center;">
                <a href="/index.html" class="btn btn-ghost btn-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    Back to Sign In
                </a>
            </div>
        </div>

        <!-- Step 2: Success Message -->
        <div id="step-success" style="display:none;text-align:center;">
            <div style="font-size:3rem;margin-bottom:var(--sp-4);">📧</div>
            <h2 style="font-size:1.25rem;margin-bottom:var(--sp-2);">Check Your Email</h2>
            <p class="text-secondary" style="font-size:0.875rem;margin-bottom:var(--sp-6);">If an account exists with that email, we've sent a password reset link. Check your inbox and spam folder.</p>
            <a href="/index.html" class="btn btn-primary">Back to Sign In</a>
        </div>
    </div>

    <script>
    let csrfToken = '';
    fetch('/api/session.php', { credentials: 'include' }).then(r=>r.json()).then(d=>{ csrfToken = d.csrf_token||''; }).catch(()=>{});

    document.getElementById('request-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('request-btn');
        btn.disabled = true;
        btn.textContent = 'Sending...';
        const flash = document.getElementById('flash-container');

        try {
            const res = await fetch('/api/password-reset.php', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'request', email: document.getElementById('reset-email').value.trim(), csrf_token: csrfToken })
            });
            // Always show success (security - don't reveal if email exists)
            document.getElementById('step-request').style.display = 'none';
            document.getElementById('step-success').style.display = 'block';
        } catch(err) {
            flash.innerHTML = `<div class="flash-msg error"><span>Network error. Please try again.</span></div>`;
            btn.disabled = false;
            btn.textContent = 'Send Reset Link';
        }
    });
    </script>
</body>
</html>
